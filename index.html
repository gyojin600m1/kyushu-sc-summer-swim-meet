<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>第49回全九州スイミングクラブ夏季水泳競技大会 エントリー確認</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090f1f;
      --bg2: #121126;
      --top: #081a31;
      --panel: #10284b;
      --panel2: #143b69;
      --panel3: #0d203d;
      --line: #214064;
      --line2: #135d86;
      --text: #edf6ff;
      --muted: #9fb1cc;
      --faint: #6f83a4;
      --accent: #09c8ff;
      --accent2: #0787d4;
      --warn: #f8c14a;
      --danger: #ff6b86;
      --ok: #43d39e;
      --shadow: 0 18px 42px rgba(0, 0, 0, .28);
      --radius: 8px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body {
      min-height: 100%;
      margin: 0;
      background: linear-gradient(180deg, var(--top) 0 260px, var(--bg2) 260px 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", sans-serif;
      font-size: 16px;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
    }
    button, input, select {
      font: inherit;
      letter-spacing: 0;
    }
    button {
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .app {
      max-width: 980px;
      min-height: 100vh;
      margin: 0 auto;
      padding-bottom: calc(32px + var(--safe-bottom));
    }
    .hero {
      padding: calc(18px + var(--safe-top)) 16px 14px;
      background: var(--top);
      border-bottom: 1px solid #1a3151;
    }
    .hero-main {
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
    }
    .meet-icon {
      width: 58px;
      height: 58px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #10c7ff, #0579c9);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.1);
      font-size: 30px;
      line-height: 1;
    }
    .meet-title {
      margin: 0;
      font-size: clamp(24px, 6vw, 38px);
      line-height: 1.16;
      font-weight: 850;
      overflow-wrap: anywhere;
    }
    .meet-sub {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: clamp(13px, 3.2vw, 18px);
      line-height: 1.38;
    }
    .notice {
      margin: 14px 0 0;
      padding: 12px 14px;
      border: 1px solid #0a7aa8;
      border-radius: var(--radius);
      background: rgba(9, 68, 113, .38);
      color: #cdeeff;
      font-size: 14px;
      line-height: 1.65;
    }
    .notice b { color: var(--accent); }
    .stats {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .stats::-webkit-scrollbar { display: none; }
    .stat {
      min-width: 96px;
      border-radius: var(--radius);
      background: #123967;
      padding: 12px 10px;
      text-align: center;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.04);
    }
    .stat strong {
      display: block;
      color: var(--accent);
      font-size: clamp(28px, 7vw, 44px);
      line-height: 1;
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }
    .stat span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .tabs-wrap {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 16px 12px;
      background: rgba(9, 15, 31, .96);
      border-bottom: 1px solid #1d2e4b;
      backdrop-filter: blur(12px);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(5, minmax(112px, 1fr));
      border: 1px solid #1d4875;
      border-radius: var(--radius);
      overflow-x: auto;
      background: #123765;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      min-height: 54px;
      border: 0;
      border-right: 1px solid #1d4875;
      background: transparent;
      color: var(--muted);
      font-weight: 850;
      font-size: 15px;
      white-space: nowrap;
    }
    .tab:last-child { border-right: 0; }
    .tab.active {
      background: linear-gradient(180deg, #0b93d8, #067ac5);
      color: white;
    }
    main {
      padding: 16px;
    }
    .view { display: none; }
    .view.active { display: block; }
    .control-stack {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 92px;
      gap: 10px;
      align-items: stretch;
    }
    .input, .select {
      width: 100%;
      min-height: 58px;
      border: 0;
      border-radius: var(--radius);
      background: #123a67;
      color: var(--text);
      outline: 2px solid transparent;
      padding: 0 18px;
      font-size: clamp(17px, 4.7vw, 24px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #dcecff 50%), linear-gradient(135deg, #dcecff 50%, transparent 50%);
      background-position: calc(100% - 22px) 25px, calc(100% - 14px) 25px;
      background-size: 8px 8px, 8px 8px;
      background-repeat: no-repeat;
      padding-right: 44px;
    }
    .input::placeholder { color: #91a8c9; }
    .input:focus, .select:focus { outline-color: rgba(9,200,255,.55); }
    .search-btn {
      min-height: 58px;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #11c7ff, #0796da);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      box-shadow: var(--shadow);
    }
    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .segmented.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .segmented.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .pill {
      min-height: 48px;
      border: 0;
      border-radius: 999px;
      background: #123a67;
      color: var(--muted);
      font-weight: 850;
      font-size: 16px;
      padding: 0 14px;
      white-space: nowrap;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.02);
    }
    .pill.active {
      background: linear-gradient(180deg, #0a95dc, #067bc5);
      color: white;
      box-shadow: inset 0 0 0 2px rgba(9,200,255,.55);
    }
    .chips {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 2px 0 4px;
      scrollbar-width: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      background: #123a67;
      color: #c1d3ec;
      padding: 0 14px;
      font-weight: 750;
      white-space: nowrap;
    }
    .chip b { color: var(--accent); margin-left: 4px; }
    .chip.active {
      background: #0b85cd;
      color: #fff;
      box-shadow: inset 0 0 0 2px rgba(9,200,255,.45);
    }
    .small-label {
      color: var(--muted);
      font-weight: 850;
      font-size: 13px;
      margin-bottom: -4px;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 22px 0 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--line);
      color: var(--accent);
      font-size: 21px;
      font-weight: 900;
    }
    .section-title span:last-child {
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .empty {
      display: grid;
      place-items: center;
      min-height: 280px;
      text-align: center;
      color: var(--muted);
    }
    .empty-icon {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 12px;
    }
    .empty strong {
      display: block;
      color: var(--text);
      font-size: 24px;
      margin-bottom: 8px;
    }
    .cards {
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid #1c3b62;
      border-radius: var(--radius);
      background: rgba(14, 35, 65, .84);
      box-shadow: 0 0 0 1px rgba(255,255,255,.02);
      overflow: hidden;
    }
    .card-btn {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      padding: 16px;
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .name {
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.25;
      font-weight: 900;
      color: var(--text);
      overflow-wrap: anywhere;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-top: 4px;
      overflow-wrap: anywhere;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 0 9px;
      background: #0d3159;
      color: #cde2fb;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.accent { color: #061724; background: var(--accent); }
    .badge.warn { color: #251900; background: var(--warn); }
    .badge.red { color: #fff; background: #d62e43; }
    .badge.blue { color: #fff; background: #076bd6; }
    .entry-list {
      display: grid;
      gap: 8px;
      padding: 0 16px 16px;
    }
    .entry-line {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      border-radius: var(--radius);
      background: rgba(10, 24, 46, .72);
      padding: 10px;
    }
    .lane-box {
      min-height: 54px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: #0b83c6;
      color: #fff;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      line-height: 1.05;
    }
    .lane-box small {
      display: block;
      color: #cfefff;
      font-size: 11px;
      font-weight: 800;
    }
    .event-text {
      font-weight: 850;
      color: #e9f5ff;
      overflow-wrap: anywhere;
    }
    .event-meta {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
    }
    .event-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }
    .event-card .card-btn {
      min-height: 150px;
      display: grid;
      align-content: start;
      gap: 10px;
    }
    .event-no {
      color: var(--accent);
      font-size: 18px;
      font-weight: 950;
    }
    .program-list {
      display: grid;
      gap: 8px;
    }
    .program-item {
      width: 100%;
      border: 1px solid #1c3b62;
      border-radius: var(--radius);
      background: rgba(14, 35, 65, .82);
      padding: 14px;
      text-align: left;
    }
    .program-row {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }
    .program-no {
      color: var(--accent);
      font-size: 18px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }
    .program-name {
      font-weight: 900;
      font-size: 17px;
      overflow-wrap: anywhere;
    }
    .program-count {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
      white-space: nowrap;
    }
    .relay-layout {
      display: grid;
      gap: 14px;
    }
    .lane-toolbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .heat-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .heat-tabs::-webkit-scrollbar { display: none; }
    .heat-btn {
      min-width: 76px;
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      background: #123a67;
      color: var(--muted);
      font-weight: 850;
    }
    .heat-btn.active {
      background: var(--accent2);
      color: #fff;
    }
    .lane-table {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: rgba(8, 19, 37, .7);
    }
    .lane-row {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      gap: 0;
      border-bottom: 1px solid rgba(54, 88, 130, .55);
      min-height: 58px;
    }
    .lane-row:last-child { border-bottom: 0; }
    .lane-num {
      display: grid;
      place-items: center;
      background: rgba(8, 82, 133, .92);
      color: #fff;
      font-size: 22px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }
    .lane-person {
      padding: 10px 12px;
      min-width: 0;
    }
    .lane-name {
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }
    .lane-team {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
      overflow-wrap: anywhere;
    }
    .lane-row.empty-lane .lane-num {
      background: rgba(48, 72, 99, .58);
      color: #9db1cb;
    }
    .lane-row.empty-lane .lane-name {
      color: #6e81a0;
      font-weight: 800;
    }
    .detail {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      background: rgba(2, 8, 18, .72);
      padding: 16px;
      overflow: auto;
    }
    .detail.open { display: grid; align-items: end; }
    .sheet {
      width: min(920px, 100%);
      max-height: calc(92vh - var(--safe-top));
      margin: 0 auto;
      overflow: hidden;
      border: 1px solid #1d4a78;
      border-radius: var(--radius);
      background: #0a162b;
      box-shadow: 0 28px 80px rgba(0,0,0,.55);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }
    .sheet-head {
      padding: 14px;
      background: #0d2748;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 10px;
      align-items: start;
    }
    .close-btn {
      width: 44px;
      height: 44px;
      border: 0;
      border-radius: 999px;
      background: #173d68;
      color: #fff;
      font-size: 25px;
      line-height: 1;
    }
    .sheet-body {
      overflow: auto;
      padding: 14px;
    }
    .footer-note {
      margin: 20px 0 0;
      color: var(--faint);
      font-size: 12px;
      text-align: center;
    }
    .team-list {
      display: none;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
    .team-list.open { display: grid; }
    .team-item {
      border: 0;
      border-radius: var(--radius);
      background: #10345e;
      padding: 10px;
      text-align: left;
      color: #d9ebff;
      font-weight: 800;
      min-height: 44px;
    }
    .team-item b { color: var(--accent); float: right; }
    .toggle-link {
      border: 0;
      background: transparent;
      color: var(--accent);
      padding: 4px 0;
      font-weight: 900;
      text-align: left;
      font-size: 16px;
    }
    @media (max-width: 740px) {
      .app { max-width: none; }
      .stats { grid-template-columns: repeat(5, 116px); }
      .tabs { grid-template-columns: repeat(5, 122px); }
      .segmented.four { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .event-grid { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: minmax(0, 1fr) 84px; }
      .search-btn { font-size: 20px; }
      .program-row { grid-template-columns: 50px minmax(0, 1fr); }
      .program-count { grid-column: 2; text-align: left; }
    }
    @media (max-width: 420px) {
      .hero { padding-inline: 14px; }
      main { padding: 14px; }
      .tabs-wrap { padding-inline: 14px; }
      .input, .select { min-height: 56px; padding-inline: 14px; }
      .pill { font-size: 15px; padding-inline: 10px; }
      .entry-line { grid-template-columns: 68px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="hero-main">
        <div class="meet-icon" aria-hidden="true">🏊</div>
        <div>
          <h1 class="meet-title">第49回全九州SC夏季</h1>
          <p class="meet-sub">2026年7月30日(木)～7月31日(金) ・ 別府市営青山プール(50m)<br>エントリー確認</p>
        </div>
      </div>
      <div class="stats" aria-label="大会集計">
        <div class="stat"><strong id="statEntries">2529</strong><span>総エントリー</span></div>
        <div class="stat"><strong id="statAthletes">0</strong><span>選手</span></div>
        <div class="stat"><strong id="statTeams">0</strong><span>所属</span></div>
        <div class="stat"><strong>117</strong><span>プログラム</span></div>
        <div class="stat"><strong>16</strong><span>リレー種目</span></div>
      </div>
      <div class="notice"><b>確認用:</b> 予選・決勝の番組は未発表のため、申込一覧の該当エントリーをプログラム順に表示します。No.25 エキシビジョンは現場エントリー未定です。</div>
    </header>

    <div class="tabs-wrap">
      <nav class="tabs" aria-label="表示切替">
        <button class="tab active" data-tab="search">選手・チーム</button>
        <button class="tab" data-tab="events">種目検索</button>
        <button class="tab" data-tab="program">プログラム</button>
        <button class="tab" data-tab="relay">リレー</button>
        <button class="tab" data-tab="lanes">レーン</button>
      </nav>
    </div>

    <main>
      <section id="view-search" class="view active">
        <div class="control-stack">
          <div class="segmented" data-filter-group="gender">
            <button class="pill active" data-value="all">全員</button>
            <button class="pill" data-value="女子">女子</button>
            <button class="pill" data-value="男子">男子</button>
          </div>
          <div class="search-row">
            <input id="personQuery" class="input" type="search" placeholder="氏名・所属・種目（ひらがな可）" autocomplete="off">
            <button id="personSearchBtn" class="search-btn">検索</button>
          </div>
          <div class="chips" id="teamChips"></div>
          <button id="toggleTeams" class="toggle-link" type="button">▼ 全チーム一覧を表示</button>
          <div id="teamList" class="team-list"></div>
        </div>
        <div class="section-title"><span>検索結果</span><span id="personResultCount">0名</span></div>
        <div id="personResults" class="cards"></div>
      </section>

      <section id="view-events" class="view">
        <div class="control-stack">
          <select id="eventProgramSelect" class="select"></select>
          <div class="segmented four" data-filter-group="eventGender">
            <button class="pill active" data-value="all">すべて</button>
            <button class="pill" data-value="女子">女子</button>
            <button class="pill" data-value="男子">男子</button>
            <button class="pill" data-value="混合">混合</button>
          </div>
          <select id="ageSelect" class="select"></select>
          <div class="chips" id="strokeChips"></div>
        </div>
        <div class="section-title"><span>種目</span><span id="eventResultCount">0種目</span></div>
        <div id="eventResults" class="event-grid"></div>
      </section>

      <section id="view-program" class="view">
        <div class="control-stack">
          <input id="programQuery" class="input" type="search" placeholder="プログラムNo・種目（ひらがな可）" autocomplete="off">
        </div>
        <div class="section-title"><span>プログラム</span><span id="programResultCount">117種目</span></div>
        <div id="programList" class="program-list"></div>
      </section>

      <section id="view-relay" class="view">
        <div class="control-stack">
          <input id="relayQuery" class="input" type="search" placeholder="リレー種目・所属（ひらがな可）" autocomplete="off">
          <div class="segmented four" data-filter-group="relayGender">
            <button class="pill active" data-value="all">すべて</button>
            <button class="pill" data-value="女子">女子</button>
            <button class="pill" data-value="男子">男子</button>
            <button class="pill" data-value="混合">混合</button>
          </div>
        </div>
        <div class="section-title"><span>リレー</span><span id="relayResultCount">0件</span></div>
        <div id="relayResults" class="cards"></div>
      </section>

      <section id="view-lanes" class="view">

_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 1 アイル宇佐 あいるうさ 15～18歳","team_kana":"あいるうさ"},{"heat":"3","lane":"2","name":"","team":"アクセス佐賀","grade":"","category":"15～18歳","display_name":"アクセス佐賀","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 2 アクセス佐賀 あくせすさが 15～18歳","team_kana":"あくせすさが"},{"heat":"3","lane":"3","name":"","team":"甘木ＳＣ","grade":"","category":"15～18歳","display_name":"甘木ＳＣ","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 3 甘木ＳＣ あまぎＳＣ 15～18歳","team_kana":"あまぎＳＣ"},{"heat":"3","lane":"4","name":"","team":"ｾｲｶKAMOIKE","grade":"","category":"15～18歳","display_name":"ｾｲｶKAMOIKE","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 4 ｾｲｶKAMOIKE せいかKAMOIKE 15～18歳","team_kana":"せいかKAMOIKE"},{"heat":"3","lane":"5","name":"","team":"ｳｫｰﾀｰﾒｲﾂ長崎","grade":"","category":"15～18歳","display_name":"ｳｫｰﾀｰﾒｲﾂ長崎","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 5 ｳｫｰﾀｰﾒｲﾂ長崎 うぉ゜た゜めいつながさき 15～18歳","team_kana":"うぉ゜た゜めいつながさき"},{"heat":"3","lane":"6","name":"","team":"Adapted","grade":"","category":"15～18歳","display_name":"Adapted","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 6 Adapted Adapted 15～18歳","team_kana":"Adapted"},{"heat":"3","lane":"7","name":"","team":"桜泳小郡三国","grade":"","category":"15～18歳","display_name":"桜泳小郡三国","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 7 桜泳小郡三国 さくらえいおごおりみくに 15～18歳","team_kana":"さくらえいおごおりみくに"},{"heat":"3","lane":"8","name":"","team":"黒佐水泳学校","grade":"","category":"15～18歳","display_name":"黒佐水泳学校","entry_type":"relay","is_empty_lane":false,"search_text":"No.117 男子 15～18歳 4×50m フリーリレー Ｔ決勝 3 8 黒佐水泳学校 くろさすいえいがっこう 15～18歳","team_kana":"くろさすいえいがっこう"}]}]}</script>
  <script>
    const DATA = JSON.parse(document.getElementById('app-data').textContent);
    const events = DATA.events;
    const eventByNo = new Map(events.map(event => [event.event_no, event]));
    const state = {
      tab: 'search',
      gender: 'all',
      eventGender: 'all',
      relayGender: 'all',
      team: '',
      stroke: 'all',
      selectedEventNo: 'all',
      laneEventNo: events.find(event => event.entries.length)?.event_no || events[0].event_no,
      laneHeat: '1'
    };

    const kanaToHira = value => String(value || '').replace(/[ァ-ヶ]/g, char =>
      String.fromCharCode(char.charCodeAt(0) - 0x60)
    );
    const normalize = value => kanaToHira(String(value || '')
      .normalize('NFKC')
      .toLowerCase()
      .replace(/(\d+)m/g, '$1'))
      .replace(/[\s\u3000・･\.\-ー]/g, '');

    const eventTitle = event => `No.${event.event_no} ${event.gender} ${event.age_class} ${event.distance} ${event.stroke} ${event.round}`;
    const eventShort = event => `${event.gender} ${event.age_class} ${event.distance} ${event.stroke}`;
    const safe = value => String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    const genderRank = gender => gender === '女子' ? 0 : gender === '男子' ? 1 : gender === '混合' ? 2 : 3;
    const ageValue = age => {
      const text = String(age || '');
      if (text.includes('無差別')) return 0;
      const nums = text.match(/\d+/g);
      if (!nums) return 0;
      return Math.max(...nums.map(Number));
    };
    const gradeValue = grade => {
      const text = String(grade || '');
      const match = text.match(/(高|中|小)(\d+)/);
      if (!match) return 0;
      const num = Number(match[2]);
      if (match[1] === '高') return 9 + num;
      if (match[1] === '中') return 6 + num;
      return num;
    };
    const compareJa = (a, b) => String(a || '').localeCompare(String(b || ''), 'ja');
    function eventCompare(a, b) {
      return genderRank(a.gender) - genderRank(b.gender)
        || ageValue(b.age_class) - ageValue(a.age_class)
        || compareJa(a.stroke, b.stroke)
        || compareJa(a.distance, b.distance)
        || a.event_no - b.event_no;
    }
    function rowCompare(a, b) {
      return eventCompare(a.event, b.event)
        || Number(a.heat || 0) - Number(b.heat || 0)
        || Number(a.lane || 0) - Number(b.lane || 0);
    }
    function personCompare(a, b) {
      return (a.type === 'relay') - (b.type === 'relay')
        || genderRank(a.primaryGender) - genderRank(b.primaryGender)
        || ageValue(b.primaryAge) - ageValue(a.primaryAge)
        || gradeValue(b.primaryGrade) - gradeValue(a.primaryGrade)
        || compareJa(a.team, b.team)
        || compareJa(a.name, b.name);
    }

    function entryRows() {
      const rows = [];
      for (const event of events) {
        for (const entry of event.entries) {
          if (entry.is_empty_lane) continue;
          rows.push({ ...entry, event_no: event.event_no, event });
        }
      }
      return rows;
    }
    const allRows = entryRows();

    function buildPeople() {
      const map = new Map();
      for (const row of allRows) {
        const isRelay = row.entry_type === 'relay';
        const keyName = isRelay && !row.name ? row.team : row.name;
        if (!keyName) continue;
        const key = `${isRelay ? 'relay' : 'person'}::${keyName}::${row.team}`;
        if (!map.has(key)) {
          map.set(key, {
            key,
            type: isRelay ? 'relay' : 'person',
            name: keyName,
            team: row.team,
            grade: row.grade,
            primaryGender: row.event.gender,
            primaryAge: row.event.age_class,
            primaryGrade: row.grade,
            genderSet: new Set(),
            ageSet: new Set(),
            entries: [],
            searchText: ''
          });
        }
        const item = map.get(key);
        item.genderSet.add(row.event.gender);
        item.ageSet.add(row.event.age_class);
        item.entries.push(row);
        if (
          genderRank(row.event.gender) < genderRank(item.primaryGender)
          || (row.event.gender === item.primaryGender && ageValue(row.event.age_class) > ageValue(item.primaryAge))
          || (row.event.gender === item.primaryGender && row.event.age_class === item.primaryAge && gradeValue(row.grade) > gradeValue(item.primaryGrade))
        ) {
          item.primaryGender = row.event.gender;
          item.primaryAge = row.event.age_class;
          item.primaryGrade = row.grade;
        }
        item.searchText += ' ' + [keyName, row.name, row.name_kana, row.name_kana_alias, row.kana, row.team, row.team_kana, row.grade, row.category, row.event_label, eventTitle(row.event)].join(' ');
      }
      for (const item of map.values()) {
        item.entries.sort(rowCompare);
      }
      return Array.from(map.values()).sort(personCompare);
    }
    const people = buildPeople();

    function teamCounts() {
      const counts = new Map();
      for (const row of allRows) {
        if (!row.team) continue;
        counts.set(row.team, (counts.get(row.team) || 0) + 1);
      }
      return Array.from(counts.entries()).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], 'ja'));
    }
    const teams = teamCounts();
    document.getElementById('statTeams').textContent = teams.length;
    document.getElementById('statAthletes').textContent = new Set(allRows.filter(row => row.name).map(row => `${row.name}::${row.team}`)).size;

    function initControls() {
      document.querySelectorAll('.tab').forEach(button => {
        button.addEventListener('click', () => setTab(button.dataset.tab));
      });
      document.querySelectorAll('[data-filter-group]').forEach(group => {
        group.addEventListener('click', event => {
          const button = event.target.closest('.pill');
          if (!button) return;
          group.querySelectorAll('.pill').forEach(item => item.classList.remove('active'));
          button.classList.add('active');
          state[group.dataset.filterGroup] = button.dataset.value;
          renderActive();
        });
      });
      document.getElementById('personSearchBtn').addEventListener('click', renderPeople);
      ['personQuery', 'programQuery', 'relayQuery'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => renderActive());
      });
      document.getElementById('eventProgramSelect').addEventListener('change', event => {
        state.selectedEventNo = event.target.value;
        renderEvents();
      });
      document.getElementById('ageSelect').addEventListener('change', event => {
        state.age = event.target.value;
        renderEvents();
      });
      document.getElementById('laneEventSelect').addEventListener('change', event => {
        state.laneEventNo = Number(event.target.value);
        const selected = eventByNo.get(state.laneEventNo);
        state.laneHeat = getHeats(selected)[0] || '1';
        renderLaneBoard();
      });
      document.getElementById('closeDetail').addEventListener('click', closeDetail);
      document.getElementById('detail').addEventListener('click', event => {
        if (event.target.id === 'detail') closeDetail();
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeDetail();
      });
      document.getElementById('toggleTeams').addEventListener('click', () => {
        const list = document.getElementById('teamList');
        list.classList.toggle('open');
        document.getElementById('toggleTeams').textContent = list.classList.contains('open')
          ? '▲ 全チーム一覧を閉じる'
          : '▼ 全チーム一覧を表示';
      });
      initFilters();
    }

    function initFilters() {
      const topTeams = teams.slice(0, 12);
      document.getElementById('teamChips').innerHTML = [
        `<button class="chip active" data-team="">全所属</button>`,
        ...topTeams.map(([team, count]) => `<button class="chip" data-team="${safe(team)}">${safe(team)} <b>${count}</b></button>`)
      ].join('');
      document.getElementById('teamChips').addEventListener('click', event => {
        const chip = event.target.closest('.chip');
        if (!chip) return;
        state.team = chip.dataset.team || '';
        document.querySelectorAll('#teamChips .chip').forEach(item => item.classList.toggle('active', item === chip));
        renderPeople();
      });
      document.getElementById('teamList').innerHTML = teams.map(([team, count]) =>
        `<button class="team-item" type="button" data-team="${safe(team)}">${safe(team)} <b>${count}</b></button>`
      ).join('');
      document.getElementById('teamList').addEventListener('click', event => {
        const item = event.target.closest('.team-item');
        if (!item) return;
        state.team = item.dataset.team;
        document.querySelectorAll('#teamChips .chip').forEach(chip => chip.classList.remove('active'));
        document.getElementById('personQuery').value = item.dataset.team;
        renderPeople();
      });
      const ages = ['all', ...Array.from(new Set(events.map(event => event.age_class))).sort((a, b) => a.localeCompare(b, 'ja'))];
      document.getElementById('ageSelect').innerHTML = ages.map(age => `<option value="${safe(age)}">${age === 'all' ? 'カテゴリーすべて' : safe(age)}<\/option>`).join('');
      state.age = 'all';
      const strokes = ['all', ...Array.from(new Set(events.map(event => event.stroke))).sort((a, b) => a.localeCompare(b, 'ja'))];
      document.getElementById('strokeChips').innerHTML = strokes.map((stroke, index) =>
        `<button class="chip ${index === 0 ? 'active' : ''}" data-stroke="${safe(stroke)}">${stroke === 'all' ? '全種目' : safe(stroke)}<\/button>`
      ).join('');
      document.getElementById('strokeChips').addEventListener('click', event => {
        const chip = event.target.closest('.chip');
        if (!chip) return;
        state.stroke = chip.dataset.stroke;
        document.querySelectorAll('#strokeChips .chip').forEach(item => item.classList.toggle('active', item === chip));
        renderEvents();
      });
      document.getElementById('eventProgramSelect').innerHTML = [
        '<option value="all">プログラム順ですべて表示</option>',
        ...events.map(event =>
          `<option value="${event.event_no}">No.${event.event_no}　${safe(event.gender)} ${safe(event.age_class)} ${safe(event.distance)} ${safe(event.stroke)} ${safe(event.round)}<\/option>`
        )
      ].join('');
      document.getElementById('laneEventSelect').innerHTML = events.map(event =>
        `<option value="${event.event_no}">${safe(eventTitle(event))}<\/option>`
      ).join('');
    }

    function setTab(tab) {
      state.tab = tab;
      document.querySelectorAll('.tab').forEach(button => button.classList.toggle('active', button.dataset.tab === tab));
      document.querySelectorAll('.view').forEach(view => view.classList.toggle('active', view.id === `view-${tab}`));
      renderActive();
    }

    function renderActive() {
      if (state.tab === 'search') renderPeople();
      if (state.tab === 'events') renderEvents();
      if (state.tab === 'program') renderProgram();
      if (state.tab === 'relay') renderRelay();
      if (state.tab === 'lanes') renderLaneBoard();
    }

    function matchesQuery(text, query) {
      const q = normalize(query);
      if (!q) return true;
      return normalize(text).includes(q);
    }

    function genderMatches(item, gender) {
      if (gender === 'all') return true;
      return item.genderSet ? item.genderSet.has(gender) : item.gender === gender;
    }

    function renderPeople() {
      const query = document.getElementById('personQuery').value;
      const container = document.getElementById('personResults');
      if (!query && !state.team) {
        document.getElementById('personResultCount').textContent = '0名';
        container.innerHTML = emptyHtml('🔍', '選手・チームを検索', 'ひらがな・カタカナ・半角カナの違いを吸収します');
        return;
      }
      let results = people.filter(item =>
        genderMatches(item, state.gender) &&
        (!state.team || item.team === state.team) &&
        matchesQuery(item.searchText, query)
      );
      results = results.slice(0, 160);
      document.getElementById('personResultCount').textContent = `${results.length}名`;
      container.innerHTML = results.length ? results.map(renderPersonCard).join('') : emptyHtml('—', '該当なし', '条件を変えて確認してください');
      bindEntryButtons(container);
    }

    function renderPersonCard(item) {
      const genderBadges = Array.from(item.genderSet)
        .sort((a, b) => genderRank(a) - genderRank(b))
        .map(g => `<span class="badge ${g === '男子' ? 'blue' : g === '女子' ? 'red' : ''}">${safe(g)}<\/span>`).join('');
      const ageBadges = Array.from(item.ageSet)
        .sort((a, b) => ageValue(b) - ageValue(a))
        .slice(0, 4)
        .map(age => `<span class="badge">${safe(age)}<\/span>`).join('');
      const typeBadge = item.type === 'relay' ? '<span class="badge warn">リレー<\/span>' : '<span class="badge accent">個人<\/span>';
      const entries = item.entries
        .map(row => entryLine(row)).join('');
      return `<article class="card">
        <button class="card-btn" type="button" data-person-key="${safe(item.key)}">
          <div class="card-head">
            <div>
              <div class="name">${safe(item.name)}<\/div>
              <div class="sub">${safe([item.team, item.grade].filter(Boolean).join(' ・ '))}<\/div>
            <\/div>
            <span class="badge accent">${item.entries.length}件<\/span>
          <\/div>
          <div class="badge-row">${typeBadge}${genderBadges}${ageBadges}<\/div>
        <\/button>
        <div class="entry-list">${entries}<\/div>
      <\/article>`;
    }

    function entryLine(row) {
      return `<button class="entry-line" type="button" data-event-no="${row.event_no}">
        <span class="lane-box"><span>${safe(row.heat)}組<br><small>${safe(row.lane)}レーン<\/small><\/span><\/span>
        <span>
          <span class="event-text">${safe(eventShort(row.event))}<\/span>
          <span class="event-meta">${safe(row.event.round)} ・ No.${row.event_no}<\/span>
        <\/span>
      <\/button>`;
    }

    function renderEvents() {
      const results = events.filter(event =>
        (state.selectedEventNo === 'all' || event.event_no === Number(state.selectedEventNo)) &&
        (state.eventGender === 'all' || event.gender === state.eventGender) &&
        (state.age === 'all' || event.age_class === state.age) &&
        (state.stroke === 'all' || event.stroke === state.stroke)
      ).sort((a, b) => a.event_no - b.event_no);
      document.getElementById('eventResultCount').textContent = `${results.length}種目`;
      document.getElementById('eventResults').innerHTML = results.length ? results.map(renderEventCard).join('') : emptyHtml('—', '該当なし', '');
      bindEventButtons(document.getElementById('eventResults'));
    }

    function renderEventCard(event) {
      const manual = event.manual_note ? `<span class="badge warn">現場未定<\/span>` : '';
      return `<article class="card event-card">
        <button class="card-btn" type="button" data-event-no="${event.event_no}">
          <div class="event-no">No.${event.event_no}<\/div>
          <div class="name">${safe(event.gender)} ${safe(event.age_class)}<\/div>
          <div class="sub">${safe(event.distance)} ${safe(event.stroke)} ・ ${safe(event.round)}<\/div>
          <div class="badge-row">
            <span class="badge accent">${event.entry_count}件<\/span>
            <span class="badge">${safe(event.heat_count_label)}<\/span>
            ${manual}
          <\/div>
        <\/button>
      <\/article>`;
    }

    function renderProgram() {
      const query = document.getElementById('programQuery').value;
      const results = events.filter(event => matchesQuery(eventTitle(event), query));
      document.getElementById('programResultCount').textContent = `${results.length}種目`;
      document.getElementById('programList').innerHTML = results.map(event => `
        <button class="program-item" type="button" data-event-no="${event.event_no}">
          <span class="program-row">
            <span class="program-no">${event.event_no}<\/span>
            <span class="program-name">${safe(event.gender)} ${safe(event.age_class)} ${safe(event.distance)} ${safe(event.stroke)}<\/span>
            <span class="program-count">${safe(event.heat_count_label)} / ${event.entry_count}件<\/span>
          <\/span>
        <\/button>`).join('');
      bindEventButtons(document.getElementById('programList'));
    }

    function renderRelay() {
      const query = document.getElementById('relayQuery').value;
      const relayEvents = events.filter(event => event.entry_type === 'relay' || event.entry_type === 'exhibition');
      const rows = [];
      for (const event of relayEvents) {
        if (event.entry_type === 'exhibition') {
          rows.push({ event, display_name: event.stroke, team: '', heat: '', lane: '', isExhibition: true, searchText: eventTitle(event) + ' ' + event.manual_note });
          continue;
        }
        for (const entry of event.entries) {
          if (entry.is_empty_lane) continue;
          rows.push({ ...entry, event, event_no: event.event_no, searchText: [eventTitle(event), entry.team, entry.heat, entry.lane].join(' ') });
        }
      }
      const filtered = rows.filter(row =>
        (state.relayGender === 'all' || row.event.gender === state.relayGender) &&
        matchesQuery(row.searchText, query)
      ).sort((a, b) => eventCompare(a.event, b.event)
        || Number(a.heat || 0) - Number(b.heat || 0)
        || Number(a.lane || 0) - Number(b.lane || 0)
        || compareJa(a.team, b.team));
      document.getElementById('relayResultCount').textContent = `${filtered.length}件`;
      document.getElementById('relayResults').innerHTML = filtered.map(row => {
        if (row.isExhibition) {
          return `<article class="card"><button class="card-btn" type="button" data-event-no="${row.event.event_no}">
            <div class="card-head"><div><div class="name">No.25 エキシビジョン<\/div><div class="sub">${safe(row.event.manual_note)}<\/div><\/div><span class="badge warn">未定<\/span><\/div>
          <\/button><\/article>`;
        }
        return `<article class="card">
          <button class="card-btn" type="button" data-event-no="${row.event_no}">
            <div class="card-head">
              <div><div class="name">${safe(row.team)}<\/div><div class="sub">${safe(eventTitle(row.event))}<\/div><\/div>
              <span class="badge accent">${safe(row.heat)}組 ${safe(row.lane)}レーン<\/span>
            <\/div>
          <\/button>
        <\/article>`;
      }).join('') || emptyHtml('—', '該当なし', '');
      bindEventButtons(document.getElementById('relayResults'));
    }

    function getHeats(event) {
      return Array.from(new Set(event.entries.map(entry => entry.heat).filter(Boolean))).sort((a, b) => Number(a) - Number(b));
    }

    function renderLaneBoard() {
      const select = document.getElementById('laneEventSelect');
      select.value = String(state.laneEventNo);
      const event = eventByNo.get(state.laneEventNo) || events[0];
      const heats = getHeats(event);
      const tabs = document.getElementById('laneHeatTabs');
      if (!heats.length) {
        tabs.innerHTML = '';
        document.getElementById('laneBoard').innerHTML = `<div class="card"><div class="card-btn"><div class="name">${safe(eventTitle(event))}<\/div><div class="sub">${safe(event.manual_note || 'エントリーは未定です')}<\/div><div class="badge-row"><span class="badge warn">現場未定<\/span><\/div><\/div><\/div>`;
        return;
      }
      if (!heats.includes(state.laneHeat)) state.laneHeat = heats[0];
      tabs.innerHTML = heats.map(heat => `<button class="heat-btn ${heat === state.laneHeat ? 'active' : ''}" type="button" data-heat="${safe(heat)}">${safe(heat)}組<\/button>`).join('');
      tabs.querySelectorAll('.heat-btn').forEach(button => button.addEventListener('click', () => {
        state.laneHeat = button.dataset.heat;
        renderLaneBoard();
      }));
      const rows = event.entries.filter(entry => entry.heat === state.laneHeat).sort((a, b) => Number(a.lane) - Number(b.lane));
      document.getElementById('laneBoard').innerHTML = `
        <div class="section-title"><span>${safe(eventTitle(event))}<\/span><span>${safe(state.laneHeat)}組<\/span><\/div>
        <div class="lane-table">${rows.map(entry => laneRow(entry, event)).join('')}<\/div>`;
    }

    function laneRow(entry, event) {
      const display = entry.is_empty_lane ? '空き' : (entry.display_name || entry.name || entry.team);
      const sub = entry.is_empty_lane ? '' : [entry.team && entry.team !== display ? entry.team : '', entry.grade || entry.category].filter(Boolean).join(' ・ ');
      return `<div class="lane-row ${entry.is_empty_lane ? 'empty-lane' : ''}">
        <div class="lane-num">${safe(entry.lane)}<\/div>
        <div class="lane-person">
          <div class="lane-name">${safe(display)}<\/div>
          <div class="lane-team">${safe(sub)}<\/div>
        <\/div>
      <\/div>`;
    }

    function bindEntryButtons(container) {
      container.querySelectorAll('[data-event-no]').forEach(button => {
        button.addEventListener('click', event => {
          event.stopPropagation();
          openEvent(Number(button.dataset.eventNo));
        });
      });
    }
    function bindEventButtons(container) {
      container.querySelectorAll('[data-event-no]').forEach(button => {
        button.addEventListener('click', () => openEvent(Number(button.dataset.eventNo)));
      });
    }

    function openEvent(eventNo) {
      const event = eventByNo.get(eventNo);
      if (!event) return;
      document.getElementById('detailTitle').textContent = eventTitle(event);
      document.getElementById('detailSub').textContent = `${event.heat_count_label} ・ ${event.entry_count}件`;
      const body = document.getElementById('detailBody');
      if (!event.entries.length) {
        body.innerHTML = `<div class="notice"><b>No.${event.event_no}:</b> ${safe(event.manual_note || 'エントリー未定')}<\/div>`;
      } else {
        const heats = getHeats(event);
        body.innerHTML = heats.map(heat => {
          const rows = event.entries.filter(entry => entry.heat === heat).sort((a, b) => Number(a.lane) - Number(b.lane));
          return `<div class="section-title"><span>${safe(heat)}組<\/span><span>${rows.filter(row => !row.is_empty_lane).length}件<\/span><\/div>
            <div class="lane-table">${rows.map(entry => laneRow(entry, event)).join('')}<\/div>`;
        }).join('');
      }
      document.getElementById('detail').classList.add('open');
    }

    function closeDetail() {
      document.getElementById('detail').classList.remove('open');
    }

    function emptyHtml(icon, title, body) {
      return `<div class="empty"><div><div class="empty-icon">${safe(icon)}<\/div><strong>${safe(title)}<\/strong><div>${safe(body)}<\/div><\/div><\/div>`;
    }

    initControls();
    renderPeople();
    renderEvents();
    renderProgram();
    renderRelay();
    renderLaneBoard();
  </script>
</body>
</html>
